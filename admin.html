<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuwait Network | لوحة الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 p-4">

    <!-- شاشة تسجيل الدخول -->
    <div id="login" class="max-w-sm mx-auto bg-white p-8 rounded-2xl shadow-lg mt-20 text-center border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Kuwait Network</h2>
        <input type="password" id="pass" placeholder="أدخل الرمز السري" class="w-full border p-3 rounded-xl mb-4 text-center outline-none focus:border-blue-500">
        <button onclick="login()" class="w-full bg-blue-900 text-white p-3 rounded-xl font-bold hover:bg-blue-800 transition">تسجيل الدخول</button>
    </div>

    <!-- لوحة البيانات -->
    <div id="dashboard" class="hidden max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">لوحة تحكم Kuwait Network</h1>
            <button onclick="location.reload()" class="bg-gray-200 px-4 py-2 rounded-lg text-sm font-bold">تحديث</button>
        </div>
        
        <div class="bg-white shadow-sm rounded-2xl border border-gray-100 overflow-hidden">
            <table class="w-full text-sm text-right">
                <thead class="bg-gray-900 text-white">
                    <tr>
                        <th class="p-4">رقم الطلب</th>
                        <th class="p-4">اسم المشترك</th>
                        <th class="p-4">رقم التواصل</th>
                        <th class="p-4">الحالة</th>
                        <th class="p-4 text-center">إجراء</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-100">
                    <tr><td colspan="5" class="p-8 text-center text-gray-500">جاري تحميل البلاغات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ضع رابط قاعدة بياناتك هنا مكان الرابط الموضح
        const DB_URL = "https://kuwait-network-system-default-rtdb.firebaseio.com/";

        function login() {
            if(document.getElementById('pass').value === "1234") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                fetchData();
            } else {
                alert("رمز المرور غير صحيح!");
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${DB_URL}tickets.json`);
                const data = await res.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = "";
                
                if (!data) {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center">لا توجد بلاغات حالياً</td></tr>';
                    return;
                }

                for(let id in data) {
                    let item = data[id];
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-4 font-bold">${item.ticketId || 'KN-000'}</td>
                            <td class="p-4">${item.clientName || 'مشترك'}</td>
                            <td class="p-4 text-blue-600 font-bold">${item.phone || 'لا يوجد'}</td>
                            <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs">${item.status || 'جديد'}</span></td>
                            <td class="p-4 text-center"><button class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-xs">عرض</button></td>
                        </tr>
                    `;
                }
            } catch(e) {
                alert("خطأ في الاتصال بالسيرفر، تأكد من رابط قاعدة البيانات.");
            }
        }
    </script>
</body>
</html>
