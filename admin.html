<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم شبح عدن</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login" class="flex justify-center items-center h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-80 text-center">
            <h2 class="text-xl font-bold mb-6">شبح عدن - الإدارة</h2>
            <input type="password" id="pass" placeholder="الرمز السري" class="w-full border p-3 rounded-lg mb-4 text-center">
            <button onclick="login()" class="w-full bg-blue-900 text-white p-3 rounded-lg font-bold">تسجيل الدخول</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4">
        <div class="bg-white p-4 rounded-xl shadow mb-6 flex justify-between items-center">
            <h1 class="font-bold text-lg">شبح عدن - لوحة المدير</h1>
            <button onclick="location.reload()" class="text-xs bg-gray-200 px-3 py-1 rounded">تحديث</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow text-center">
                <p class="text-gray-500 text-xs">إجمالي الطلبات</p>
                <h3 id="totalCount" class="text-xl font-bold">0</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow text-center">
                <p class="text-gray-500 text-xs">طلبات جديدة</p>
                <h3 id="newCount" class="text-xl font-bold text-blue-600">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="p-3">الطلب</th>
                        <th class="p-3">المشترك</th>
                        <th class="p-3">التواصل</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const DB_URL = "https://kuwait-network-system-default-rtdb.firebaseio.com/";

        function login() {
            if(document.getElementById('pass').value === "1234") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else {
                alert("رمز خطأ!");
            }
        }

        async function loadData() {
            const res = await fetch(`${DB_URL}tickets.json`);
            const data = await res.json();
            const tbody = document.getElementById('tableBody');
            let total = 0, news = 0;
            tbody.innerHTML = "";
            for(let id in data) {
                let item = data[id];
                total++;
                if(item.status === 'new') news++;
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-3">${item.ticketId || 'N/A'}</td>
                        <td class="p-3">${item.clientName || 'مشترك'}</td>
                        <td class="p-3 font-bold text-blue-600">${item.phone || 'لا يوجد'}</td>
                    </tr>
                `;
            }
            document.getElementById('totalCount').innerText = total;
            document.getElementById('newCount').innerText = news;
        }
    </script>
</body>
</html>
